name: Verify Helm schemas

on:
  - pull_request

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # ratchet:actions/checkout@v5

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # ratchet:azure/setup-helm@v4.3.1

      - name: Install helm-schema
        run: |
          helm plugin install https://github.com/dadav/helm-schema --verify=false
        shell: bash

      - name: Cache APT Packages
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # ratchet:awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: jq moreutils
          version: "1.0"

      - name: Run make schema
        run: |
          make schema
        shell: bash

      - name: Files changed
        run: |
          git diff --exit-code
        shell: bash
