name: Verify Helm formatting

on:
  - pull_request

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # ratchet:actions/checkout@v5

      - name: Install helmfmt
        uses: jaxxstorm/action-install-gh-release@6096f2a2bbfee498ced520b6922ac2c06e990ed2 # ratchet:jaxxstorm/action-install-gh-release@v2.1.0
        with:
          repo: digitalstudium/helmfmt

      - name: Run helmfmt
        run: |
          helmfmt charts/polars --disable-indent=tpl
        shell: bash

      - name: Files changed
        run: |
          git diff --exit-code
        shell: bash
