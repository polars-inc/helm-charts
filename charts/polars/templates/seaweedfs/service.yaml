{{- if .Values.anonymousResults.seaweedfs.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "polars.seaweedfs.fullname" . }}
  labels:
    app.kubernetes.io/component: seaweedfs
    {{ include "polars.labels" . | nindent 4 }}
  {{- with .Values.seaweedfs.service.annotations }}
  annotations:
    {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: seaweedfs
    {{ include "polars.selectorLabels" . | nindent 4 }}
  ports:
    - name: s3
      port: 8333
      targetPort: s3
      protocol: TCP
{{- end }}
